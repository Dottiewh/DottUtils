debug_mode: false #may post lots of spam

# Performance options
load_cache_async: true # Applies for menú things like Musics
# Game things
pvp: true
pvp_bypass: false # If true, admins can attack other victims even with pvp turned off
whitelist_active: false
no_fall: false
item_display: true # If true, players may do <item> to display their main hand item.
max_itemgive_amount: 250

tpa_active: true
petition_active_for: 60 # in seconds
save_back_when_tpa: true

back_active: true
back_encrypt_mode: 0 #0 None, 1 Basic, 2 Advanced | WARNING: changing the mode may interfere with saved backs.
add_encrypt_mode_to_save: true
delay_onback: 100 #Ticks
back_expires_on_stop: false # if false, some backs may never expire, be caution!
back_expire_time: 300 # Seconds (-1 for never)

default_music_volume: 1 # integer between 0-2

# These are some custom features, but aren't recommended to be used
custom_spawn_ft_enabled: false
custom_spawn_forcetp: false

# only for discordSRV compatibility
# on discord srv you may also config this. Example: (Around line 89 config.yml on /DiscordSRV/)
# UseModernPaperChatEvent: true
discord_adminchat_channel: "CHANNELID"